<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Selection</title>
    <link rel="stylesheet" href="css/food.css" />
  </head>
  <body>
    <div id="foodquestion">
      <b>What food would you like to eat?</b>
    </div>

    <div class="food-selection">
      <div class="food-item">
        <img src="food/burgers.jpeg" alt="Burgers, fries and fried chicken" />
        <label
          ><input
            type="checkbox"
            name="food"
            value="Burgers, fries and fried chicken"
          />
          Burgers, fries and fried chicken</label
        >
      </div>
      <div class="food-item">
        <img src="food/fastfood.jpg" alt="Fastfood" />
        <label
          ><input type="checkbox" name="food" value="Fastfood" />Fastfood</label
        >
      </div>
      <div class="food-item">
        <img src="food/samgyupsal.jpeg" alt="Samgyupsal" />
        <label
          ><input type="checkbox" name="food" value="Samgyupsal" />Samgyupsal</label
        >
      </div>
      <div class="food-item">
        <img src="food/pasta.jpeg" alt="pasta" />
        <label><input type="checkbox" name="food" value="pasta" />Pasta</label>
      </div>
      <div class="food-item">
        <img src="food/pizza.jpeg" alt="pizza" />
        <label><input type="checkbox" name="food" value="pizza" />Pizza</label>
      </div>
      <div class="food-item">
        <img src="food/salad.jpeg" alt="salad" />
        <label><input type="checkbox" name="food" value="salad" />Salad</label>
      </div>
      <div class="food-item">
        <img src="food/steak.jpeg" alt="steak" />
        <label><input type="checkbox" name="food" value="steak" />Steak</label>
      </div>
      <div class="food-item">
        <img src="food/sushi.jpeg" alt="sushi" />
        <label><input type="checkbox" name="food" value="sushi" />Sushi</label>
      </div>
    </div>
    <button class="button" onclick="saveFood()">
      Continue Hihihhh... 
    </button>
    <script>
      function saveFood() {
        const values = Array.from(document.querySelectorAll('input[name="food"]:checked')).map((input) => input.value);
        localStorage.setItem('monthsarryFood', JSON.stringify(values));
        location.href = 'dessert.html';
      }
    </script>
  </body>
</html>
